<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>

  <body>
    <div class="main-container">
      <!-- Form Section -->
      <div class="form-container">
        <h1 id="mainHead">STUDENT REGISTRATION FORM</h1>
        <p>Please fill in all details for enrollment</p>

        <form method="post" action="Data.php">
          <div class="form-row">
            <div class="input-box">
              <label>First Name</label>
              <input
                type="text"
                placeholder="Student First Name"
                name="first_name"
              />
            </div>

            <div class="input-box">
              <label>Last Name</label>
              <input type="text" placeholder="Last Name" name="last_name" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Father's Name</label>
              <input type="text" placeholder="Father Name" name="father_name" />
            </div>

            <div class="input-box">
              <label>Date of Birth</label>
              <input type="date" name="dob" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Contact No.</label>
              <input
                type="number"
                placeholder="Enter your Contact No."
                name="contact"
              />
            </div>

            <div class="input-box">
              <label>Email Address</label>
              <input
                type="email"
                placeholder="Enter your Email Address"
                name="email"
              />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Password</label>
              <input
                type="password"
                placeholder="Enter your password"
                name="password"
              />
            </div>

            <div class="input-box">
              <label> Confrim Password</label>
              <input type="password" placeholder="Confrim Password" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Qualification</label>

              <select name="qualification">
                <option>Qualification</option>
                <option>10th</option>
                <option>12th</option>
                <option>under graduation</option>
                <option>post graduation</option>
              </select>
            </div>

            <div class="input-box">
              <label>Courses to Enroll</label>

              <select name="course">
                <option>Select your course</option>
                <option>Computer Science</option>
                <option>Business Admin</option>
                <option>Engineering</option>
                <option>Mechenical</option>
                <option>Artificial Intelligence</option>
                <option>mechine learning</option>
              </select>
            </div>
          </div>

          <div class="button-group">
            <button type="submit" class="submit-btn" name="submit">
              Submit
            </button>
            <button type="reset" class="reset-btn">Reset</button>
            <a
              class="back-btn"
              href="http://localhost/SMS/Project/pages/homepage/student_login.php"
            >
              <i class="ri-arrow-left-line"></i> Back to login
            </a>
          </div>
        </form>
      </div>

      <div class="right-side">
        <div class="overlay">
          <img src="../../images/3Dside.jpeg" alt="Student Image" />
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
