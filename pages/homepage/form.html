<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Student Registration Form</title>
    <link rel="stylesheet" href="form.css" />
  </head>

  <body>
    <div class="main-container">
      <!-- Form Section -->
      <div class="form-container">
        <h1 id="mainHead">STUDENT REGISTRATION FORM</h1>
        <p>Please fill in all details for enrollment</p>

        <form>
          <div class="form-row">
            <div class="input-box">
              <label>First Name</label>
              <input type="text" placeholder="Student First Name" />
            </div>

            <div class="input-box">
              <label>Last Name</label>
              <input type="text" placeholder="Last Name" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Father's Name</label>
              <input type="text" placeholder="Father Name" />
            </div>

            <div class="input-box">
              <label>Date of Birth</label>
              <input type="date" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Contact No.</label>
              <input type="number" placeholder="Enter your Contact No." />
            </div>

            <div class="input-box">
              <label>Email Address</label>
              <input type="email" placeholder="Enter your Email Address" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Password</label>
              <input type="password" placeholder="Enter your password" />
            </div>

            <div class="input-box">
              <label> Confrim Password</label>
              <input type="password" placeholder="Confrim Password" />
            </div>
          </div>

          <div class="form-row">
            <div class="input-box">
              <label>Qualification</label>

              <select>
                <option>Qualification</option>
                <option>10th</option>
                <option>12th</option>
                <option>under graduation</option>
                <option>post graduation</option>
              </select>
            </div>

            <div class="input-box">
              <label>Courses to Enroll</label>

              <select>
                <option>Select your course</option>
                <option>Computer Science</option>
                <option>Business Admin</option>
                <option>Engineering</option>
                <option>Mechenical</option>
                <option>Artificial Intelligence</option>
                <option>mechine learning</option>
              </select>
            </div>
          </div>

          <div class="button-group">
            <button type="submit" class="submit-btn">Submit</button>

            <button type="reset" class="reset-btn">Reset</button>
          </div>
        </form>
      </div>

      <div class="right-side">
        <div class="overlay">
          <!-- Replace with your image -->
          <img src="/Project/images/3Dside.jpeg" alt="Student Image" />
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
