<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>course</title>
    <link rel="stylesheet" href="admin.css" />
    <link rel="stylesheet" href="course.css" />

    <!-- for graph -->
    <script
      type="text/javascript"
      src="https://www.gstatic.com/charts/loader.js"
    ></script>
    <script type="text/javascript">
      google.charts.load("current", { packages: ["corechart"] });
      google.charts.setOnLoadCallback(drawChart);
      function drawChart() {
        var data = google.visualization.arrayToDataTable([
          ["Task", "Hours per Day"],
          ["Total Courses", 11],
          ["Active Courses", 2],
          ["Upcoming Courses", 2],
        ]);

        var options = {
          title: "My Daily Activities",
          pieHole: 0.4,
          backgroundColor: "transparent",
        };

        var chart = new google.visualization.PieChart(
          document.getElementById("donutchart"),
        );
        chart.draw(data, options);
      }
    </script>
  </head>
  <body>
    <div class="main">
      <div class="leftpannel">
        <h1 class="adminHead">Courses</h1>
        <div class="itemsBox">
          <ul class="list_items">
            <a href="Admin_Dashboard.html"
              ><li class="items">
                <i class="ri-home-4-fill"></i> Dashboard
              </li></a
            >

            <a href="Stud_sect.html">
              <li class="items">
                <i class="ri-graduation-cap-fill"></i> Students
              </li>
            </a>
            <a href="teachers.html"
              ><li class="items">
                <i class="ri-presentation-fill"></i> Teachers
              </li></a
            >
            <a href="course.html">
              <li class="items active">
                <i class="ri-book-3-fill"></i> Courses
              </li>
            </a>

            <li id="logoOut" class="items">
              <i class="ri-logout-box-r-line"></i> Logout
            </li>
          </ul>
        </div>
      </div>
      <div class="rightContent">
        <div id="coursePopup" class="popup-overlay">
          <div class="popup-content">
            <button class="close-btn">&times;</button>
            <h3>Add New Course</h3>

            <form id="courseForm">
              <div class="input-group">
                <label>Course Code</label>
                <input
                  id="Course_Id"
                  name="id"
                  type="number"
                  placeholder="Enter code"
                  required
                />
              </div>

              <div class="input-group">
                <label>Course Name</label>
                <input
                  id="CourseName"
                  name="name"
                  type="text"
                  placeholder="Enter Name"
                  required
                />
              </div>

              <div class="input-group">
                <label>Instructor</label>

                <input
                  id="InstrName"
                  name="instructor"
                  type="text"
                  placeholder="Enter Name"
                  required
                />
              </div>

              <div class="input-group">
                <label>Students</label>
                <input id="StudCount" name="students" type="number" required />
              </div>

              <div class="input-group">
                <label>Status</label>
                <select required id="courseStatus" name="status">
                  <option value="Active">Active</option>
                  <option value="Inactive">Inactive</option>
                </select>
              </div>

              <button type="submit" class="submit-btn">Add Course</button>
            </form>
          </div>
        </div>
        <div class="overviewSect">
          <!-- <h1 class="mainHead">Overview</h1> -->
          <div class="cardSect">
            <div id="cards" class="card1">
              <div id="card_logo" class="logo1">
                <i class="ri-book-open-fill"></i>
              </div>
              <div class="data1">
                <h1>1500</h1>
                <h2>Total Courses</h2>
              </div>
            </div>
            <div id="cards" class="card2">
              <div class="data2">
                <h1>55</h1>
                <h2>Active Courses</h2>
              </div>
              <div id="card_logo" class="logo2">
                <i class="ri-book-open-fill"></i>
              </div>
            </div>
            <div id="cards" class="card3">
              <div class="data3">
                <h1>20</h1>
                <h2>Upcoming Courses</h2>
              </div>
              <div id="card_logo" class="logo3">
                <i class="ri-book-3-fill"></i>
              </div>
            </div>
          </div>
          <div class="content2">
            <div class="midContent">
              <div class="coursOverview">
                <div id="donutchart" style="width: 47vw; height: 37vh"></div>
              </div>
              <div class="illustr"></div>
            </div>
            <div class="bottomSect">
              <div class="courseHandler">
                <div class="cours_content">
                  <div id="topBar">
                    <div class="search">
                      <input
                        type="text"
                        id="searchBar"
                        placeholder="search..."
                      />
                      <button id="searBtn">
                        <i class="ri-search-line"></i> Search
                      </button>
                    </div>
                    <div id="handler">
                      <button id="addBtn">
                        Add <i class="ri-add-circle-fill"></i>
                      </button>
                      <button id="clearBtn">
                        Reset <i class="ri-reset-right-line"></i>
                      </button>
                    </div>
                  </div>
                  <div class="Course_manag">
                    <div id="Cour_mangerHead">
                      <h1 id="headId" class="head">Course code</h1>
                      <h1 id="headName" class="head">Course Name</h1>
                      <h1 id="headEmail" class="head">Instructor</h1>
                      <h1 id="headDep" class="head">Students</h1>
                      <h1 id="headStatus" class="head">Status</h1>
                    </div>
                    <ul id="Cour_todo"></ul>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>

  <script>
    let courseForm = document.querySelector(".popup-overlay"),
      form = document.getElementById("courseForm"),
      todo = document.getElementById("Cour_todo");

    // Local Storage se data load
    let list = JSON.parse(localStorage.getItem("courseData")) || [];

    const render = () => {
      todo.innerHTML = list
        .map(
          (t, i) => `
      <li class="todoLists" data-index="${i}">
        ${["id", "name", "instructor", "students", "status"].map((k) => `<div class="head2">${t[k]}</div>`).join("")}
        <div class="actions">
          <div class="edit-btn actBtns"><i class="ri-pencil-fill"></i></div>
          <div class="delete-btn actBtns"><i class="ri-delete-bin-5-fill"></i></div>
        </div>
      </li>`,
        )
        .join("");
    };
    render();

    const save = () => {
      localStorage.setItem("courseData", JSON.stringify(list));
      render();
    };

    document
      .getElementById("addBtn")
      .addEventListener("click", () => (courseForm.style.display = "flex"));
    document
      .querySelector(".close-btn")
      .addEventListener("click", () => (courseForm.style.display = "none"));
    document.getElementById("clearBtn").addEventListener("click", () => {
      if (confirm("Clear all?")) {
        list = [];
        save();
      }
    });

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      list.push(Object.fromEntries(new FormData(form)));
      save();
      courseForm.style.display = "none";
      form.reset();
    });

    todo.addEventListener("click", (e) => {
      const row = e.target.closest(".todoLists");
      if (!row) return;
      const index = row.getAttribute("data-index");

      if (e.target.closest(".delete-btn") && confirm("Delete this?")) {
        list.splice(index, 1);
        save();
      } else if (e.target.closest(".edit-btn")) {
        const item = list[index];
        Object.keys(item).forEach((key) => {
          if (form[key]) form[key].value = item[key];
        });
        courseForm.style.display = "flex";
        list.splice(index, 1);
        save();
      }
    });
  </script>
</html>
