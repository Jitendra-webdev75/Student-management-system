<!doctype html>
<html lang="en">
  <head>
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin</title>
    <link rel="stylesheet" href="admin.css" class="css" />
  </head>
  <body>
    <div class="main">
      <div class="leftpannel">
        <h1 class="adminHead">Admin</h1>
        <div class="itemsBox">
          <ul class="list_items">
            <li><i class="ri-home-4-fill"></i> Dashboard</li>
            <li><i class="ri-graduation-cap-fill"></i> Students</li>
            <li><i class="ri-presentation-fill"></i> Teachers</li>
            <li><i class="ri-book-3-fill"></i> Courses</li>
            <li><i class="ri-logout-box-fill"></i> Logout</li>
          </ul>
        </div>
      </div>
      <div class="rightContent">
        <div class="nav"></div>
        <div class="overviewSect">
          <h1>Overview</h1>
          <div class="cardSect">
            <div id="cards" class="card1">
              <div class="data1">
                <h1>1500</h1>
                <h2>Total Students</h2>
              </div>
              <div id="card_logo" class="logo1">
                <i class="ri-graduation-cap-fill"></i>
              </div>
            </div>
            <div id="cards" class="card2">
              <div class="data2">
                <h1>55</h1>
                <h2>Total Teachers</h2>
              </div>
              <div id="card_logo" class="logo2">
                <i class="ri-presentation-fill"></i>
              </div>
            </div>
            <div id="cards" class="card3">
              <div class="data3">
                <h1>20</h1>
                <h2>Active Courses</h2>
              </div>
              <div id="card_logo" class="logo3">
                <i class="ri-book-3-fill"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
